<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caixa Galeteria Cloud</title>
    <style>
        :root { --vermelho: #d62828; --azul: #0077b6; --verde: #2a9d8f; --cinza: #f4f4f4; --escuro: #1d3557; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--cinza); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .hidden { display: none; }
        
        /* Estilo dos Inputs */
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        
        /* Itens de Venda */
        .header-item { background: var(--vermelho); color: white; padding: 10px; text-align: center; font-weight: bold; border-radius: 8px; margin-top: 12px; }
        .controle-venda { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .btn-control { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 24px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-mais { background: var(--azul); } .btn-menos { background: var(--vermelho); }
        
        /* Cards de Resumo */
        .card { background: var(--azul); color: white; padding: 12px; border-radius: 8px; text-align: center; margin-top: 10px; font-weight: bold; }
        .btn-acao { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }

        /* Modal */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; z-index:1000; padding: 20px; }
        .modal-content { background:white; padding:20px; border-radius:15px; width:100%; max-width:350px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2 style="text-align:center; color:var(--escuro)">🍗 Galeteria Cloud</h2>
        <p style="text-align:center; color:#666">Digite a senha para sincronizar</p>
        <input type="password" id="campoSenha" placeholder="Senha Mestra">
        <button class="btn-acao" style="background:var(--azul)" onclick="tentarLogin()">ENTRAR E CONECTAR</button>
    </div>

    <div id="caixa-screen" class="hidden">
        <div id="data-display" style="text-align:center; font-weight:bold; color:var(--azul); margin-bottom: 10px;"></div>
        
        <div id="lista-produtos"></div>
        
        <div class="card" style="background:#f8f9fa; color:#333; border: 1px solid #ddd;">
            SAÍDAS / DESPESAS:
            <input type="number" id="despesa" placeholder="R$ 0,00" oninput="calcular()">
        </div>

        <div class="card" style="background:var(--verde)">
            SALDO LÍQUIDO: <span id="totalLiquido" style="font-size: 24px;">R$ 0,00</span>
        </div>

        <button class="btn-acao" style="background:var(--escuro)" onclick="perguntaFechar()">🚀 FINALIZAR E SALVAR NA NUVEM</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button class="btn-acao" style="background:#f4a261" onclick="abrirRelatorio()">📊 PLANILHA</button>
            <button class="btn-acao" style="background:#6c757d" onclick="confirmarLimpeza()">⚠️ LIMPAR TUDO</button>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="m-titulo">Aviso</h3>
        <p id="m-msg" style="white-space: pre-line; margin-bottom: 20px; color: #444;"></p>
        <div id="m-btns" style="display:flex; flex-direction:column; gap:10px;"></div>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO (COLOQUE SUAS REAIS AQUI) ---
    const URL_API = "https://script.google.com/macros/s/AKfycbyqLCchPinwxWB8Xgj588evxWAcgPesj1lzVXWr62QlcJwV3-pcqv5z-I9_H3ftFU8G/exec"; 
    const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/1URjTWwWCaOgp_TFWLntAtPMRKZxNbEEY65M6DEEv3V8/edit";
    
    let senhaUsuario = "";
    let vendas = {};
    let countLimpar = 0;

    const produtos = [
        { id: 'frango', nome: 'FRANGO ASSADO', preco: 20.00 },
        { id: 'baiao', nome: 'BAIÃO DE DOIS', preco: 5.00 },
        { id: 'linguica', nome: 'LINGUIÇA UNIT.', preco: 3.00 },
        { id: 'cerveja', nome: 'CERVEJAS', preco: 6.00 }
    ];

    function tentarLogin() {
        senhaUsuario = document.getElementById('campoSenha').value;
        abrirModal("Conectando...", "Verificando senha no banco de dados...", "");

        fetch(URL_API, { method: "POST", body: JSON.stringify({ acao: "login", senha: senhaUsuario }) })
        .then(r => r.text())
        .then(res => {
            if(res === "LOGIN_OK") {
                fecharModal();
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('caixa-screen').classList.remove('hidden');
                iniciar();
            } else {
                abrirModal("Erro", "Senha incorreta ou erro de conexão.", '<button class="btn-acao" style="background:var(--vermelho)" onclick="fecharModal()">TENTAR NOVAMENTE</button>');
            }
        }).catch(() => alert("Erro ao conectar com o Google!"));
    }

    function iniciar() {
        document.getElementById('data-display').innerText = new Date().toLocaleDateString('pt-br', {weekday:'long', day:'numeric', month:'long'});
        const container = document.getElementById('lista-produtos');
        container.innerHTML = "";
        produtos.forEach(p => {
            container.innerHTML += `
                <div class="header-item">${p.nome} (R$ ${p.preco.toFixed(2)})</div>
                <div class="controle-venda">
                    <button class="btn-control btn-menos" onclick="mudar('${p.id}', -1)">-</button>
                    <span id="q-${p.id}" style="font-weight:bold; font-size:24px;">0</span>
                    <button class="btn-control btn-mais" onclick="mudar('${p.id}', 1)">+</button>
                    <span id="v-${p.id}" style="font-weight:bold; color:var(--verde)">R$ 0,00</span>
                </div>`;
        });
    }

    function mudar(id, v) {
        vendas[id] = (vendas[id] || 0) + v;
        if(vendas[id] < 0) vendas[id] = 0;
        calcular();
    }

    function calcular() {
        let bruto = 0;
        produtos.forEach(p => {
            let q = vendas[p.id] || 0;
            bruto += (q * p.preco);
            document.getElementById(`q-${p.id}`).innerText = q;
            document.getElementById(`v-${p.id}`).innerText = (q * p.preco).toLocaleString('pt-br',{style:'currency',currency:'BRL'});
        });
        let desp = parseFloat(document.getElementById('despesa').value) || 0;
        document.getElementById('totalLiquido').innerText = (bruto - desp).toLocaleString('pt-br',{style:'currency',currency:'BRL'});
    }

    function perguntaFechar() {
        abrirModal("Finalizar?", "Deseja enviar este fechamento para a planilha em nuvem?", `
            <button class="btn-acao" style="background:var(--verde)" onclick="enviarNuvem()">SIM, SALVAR TUDO</button>
            <button class="btn-acao" style="background:#bbb" onclick="fecharModal()">CANCELAR</button>
        `);
    }

    function enviarNuvem() {
        const dados = {
            acao: "salvar",
            senha: senhaUsuario,
            data: new Date().toLocaleDateString('pt-br'),
            total: document.getElementById('totalLiquido').innerText,
            despesa: document.getElementById('despesa').value || "0",
            liquido: document.getElementById('totalLiquido').innerText
        };

        abrirModal("Salvando...", "Sincronizando com a planilha...", "");

        fetch(URL_API, { method: "POST", body: JSON.stringify(dados) })
        .then(r => r.text())
        .then(res => {
            if(res === "SALVO") {
                abrirModal("✅ SALVO COM SUCESSO!", "Os dados já estão na sua Planilha Google.", '<button class="btn-acao" style="background:var(--azul)" onclick="location.reload()">INICIAR NOVO DIA</button>');
            }
        });
    }

    function confirmarLimpeza() {
        countLimpar++;
        if(countLimpar === 1) {
            abrirModal("⚠️ AVISO 1/3", "Deseja mesmo LIMPAR a tela? Os dados não salvos sumirão!", '<button class="btn-acao" style="background:var(--vermelho)" onclick="confirmarLimpeza()">CONTINUAR</button><button class="btn-acao" style="background:#bbb" onclick="fecharModal()">CANCELAR</button>');
        } else if(countLimpar === 2) {
            abrirModal("🚫 AVISO 2/3", "CUIDADO! Essa ação é para quando você erra muito no lançamento.", '<button class="btn-acao" style="background:var(--vermelho)" onclick="confirmarLimpeza()">CONTINUAR</button><button class="btn-acao" style="background:#bbb" onclick="fecharModal()">CANCELAR</button>');
        } else if(countLimpar === 3) {
            location.reload(); 
        }
    }

    function abrirRelatorio() {
        abrirModal("Relatórios em Nuvem", "Você pode acessar a planilha de qualquer lugar.", `
            <button class="btn-acao" style="background:var(--verde)" onclick="window.open('${URL_PLANILHA}')">ABRIR GOOGLE SHEETS</button>
            <button class="btn-acao" style="background:#bbb" onclick="fecharModal()">VOLTAR</button>
        `);
    }

    function abrirModal(t, m, b) {
        document.getElementById('m-titulo').innerText = t;
        document.getElementById('m-msg').innerText = m;
        document.getElementById('m-btns').innerHTML = b;
        document.getElementById('modal').style.display = 'flex';
    }
    
    function fecharModal() { 
        document.getElementById('modal').style.display = 'none'; 
        countLimpar = 0; 
    }
</script>
</body>
</html>
