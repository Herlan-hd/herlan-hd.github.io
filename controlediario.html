<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galeteria Sincronizada</title>
    <style>
        :root { --vermelho: #d62828; --azul: #0077b6; --verde: #2a9d8f; --cinza: #f4f4f4; --escuro: #1d3557; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--cinza); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .hidden { display: none; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        .header-item { background: var(--vermelho); color: white; padding: 10px; text-align: center; font-weight: bold; border-radius: 8px; margin-top: 12px; }
        .controle-venda { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .btn-control { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 24px; color: white; cursor: pointer; }
        .btn-mais { background: var(--azul); } .btn-menos { background: var(--vermelho); }
        .card { background: var(--azul); color: white; padding: 12px; border-radius: 8px; text-align: center; margin-top: 10px; font-weight: bold; }
        .btn-acao { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; z-index:1000; padding: 20px; }
        .modal-content { background:white; padding:20px; border-radius:15px; width:100%; max-width:350px; text-align:center; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2 style="text-align:center;">🍗 Galeteria Cloud</h2>
        <input type="password" id="campoSenha" placeholder="Senha Mestra">
        <button class="btn-acao" style="background:var(--azul)" onclick="tentarLogin()">ENTRAR</button>
    </div>

    <div id="caixa-screen" class="hidden">
        <button onclick="buscarDadosNuvem()" style="background:#ffca28; color:#000; width:100%; border:none; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer; margin-bottom:10px;">🔄 SINCRONIZAR COM OUTRO CELULAR</button>
        
        <div id="data-display" style="text-align:center; font-weight:bold; color:var(--azul);"></div>
        <div id="lista-produtos"></div>
        
        <div class="card" style="background:#f8f9fa; color:#333;">
            DESPESAS: <input type="number" id="despesa" oninput="calcular(true)" placeholder="0.00">
        </div>

        <div class="card" style="background:var(--verde)">LÍQUIDO: <span id="totalLiquido">R$ 0,00</span></div>

        <button class="btn-acao" style="background:var(--escuro)" onclick="perguntaFechar()">✅ FINALIZAR DIA E SALVAR</button>
        <button class="btn-acao" style="background:#6c757d" onclick="confirmarLimpeza()">⚠️ LIMPAR</button>
    </div>
</div>

<div id="modal" class="modal"><div class="modal-content"><h3 id="m-titulo"></h3><p id="m-msg"></p><div id="m-btns"></div></div></div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyqLCchPinwxWB8Xgj588evxWAcgPesj1lzVXWr62QlcJwV3-pcqv5z-I9_H3ftFU8G/exec"; 
    let senhaUsuario = "";
    let vendas = {};
    let countLimpar = 0;
    const produtos = [
        { id: 'frango', nome: 'FRANGO ASSADO', preco: 20.00 },
        { id: 'baiao', nome: 'BAIÃO DE DOIS', preco: 5.00 }
    ];

    function tentarLogin() {
        senhaUsuario = document.getElementById('campoSenha').value;
        fetch(URL_API, { method: "POST", body: JSON.stringify({ acao: "login", senha: senhaUsuario }) })
        .then(r => r.text()).then(res => {
            if(res === "LOGIN_OK") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('caixa-screen').classList.remove('hidden');
                iniciar();
                buscarDadosNuvem(); // Puxa dados ao entrar
            } else alert("Senha incorreta!");
        });
    }

    function iniciar() {
        document.getElementById('data-display').innerText = new Date().toLocaleDateString('pt-br', {weekday:'long', day:'numeric'});
        const container = document.getElementById('lista-produtos');
        container.innerHTML = "";
        produtos.forEach(p => {
            container.innerHTML += `<div class="header-item">${p.nome}</div>
                <div class="controle-venda">
                    <button class="btn-control btn-menos" onclick="mudar('${p.id}', -1)">-</button>
                    <span id="q-${p.id}" style="font-weight:bold; font-size:24px;">0</span>
                    <button class="btn-control btn-mais" onclick="mudar('${p.id}', 1)">+</button>
                    <span id="v-${p.id}" style="font-weight:bold; color:var(--verde)">R$ 0,00</span>
                </div>`;
        });
    }

    function mudar(id, v) {
        vendas[id] = (vendas[id] || 0) + v;
        if(vendas[id] < 0) vendas[id] = 0;
        calcular(true); // O true indica que deve enviar para a nuvem
    }

    function calcular(enviarParaNuvem = false) {
        let bruto = 0;
        produtos.forEach(p => {
            let q = vendas[p.id] || 0;
            bruto += (q * p.preco);
            document.getElementById(`q-${p.id}`).innerText = q;
            document.getElementById(`v-${p.id}`).innerText = (q * p.preco).toLocaleString('pt-br',{style:'currency',currency:'BRL'});
        });
        let desp = document.getElementById('despesa').value || 0;
        document.getElementById('totalLiquido').innerText = (bruto - desp).toLocaleString('pt-br',{style:'currency',currency:'BRL'});

        if(enviarParaNuvem) {
            fetch(URL_API, { method: "POST", body: JSON.stringify({ acao: "atualizar_rascunho", senha: senhaUsuario, vendas: vendas, despesa: desp }) });
        }
    }

    function buscarDadosNuvem() {
        fetch(URL_API).then(r => r.json()).then(dados => {
            vendas = dados.vendas || {};
            document.getElementById('despesa').value = dados.despesa || "";
            calcular(false); // Atualiza a tela sem reenviar
        });
    }

    function perguntaFechar() {
        abrirModal("Fechar Dia?", "Isso salva no relatório permanente e limpa a tela de ambos.", `
            <button class="btn-acao" style="background:var(--verde)" onclick="enviarFinal()">CONFIRMAR</button>
            <button class="btn-acao" style="background:#bbb" onclick="fecharModal()">VOLTAR</button>
        `);
    }

    function enviarFinal() {
        const dados = { acao: "salvar", senha: senhaUsuario, data: new Date().toLocaleDateString('pt-br'), total: document.getElementById('totalLiquido').innerText, despesa: document.getElementById('despesa').value, liquido: document.getElementById('totalLiquido').innerText };
        fetch(URL_API, { method: "POST", body: JSON.stringify(dados) }).then(() => location.reload());
    }

    function confirmarLimpeza() {
        countLimpar++;
        if(countLimpar < 3) abrirModal("Aviso "+countLimpar+"/3", "Deseja limpar?", '<button class="btn-acao" style="background:var(--vermelho)" onclick="confirmarLimpeza()">CONTINUAR</button>');
        else location.reload();
    }

    function abrirModal(t, m, b) {
        document.getElementById('m-titulo').innerText = t; document.getElementById('m-msg').innerText = m;
        document.getElementById('m-btns').innerHTML = b; document.getElementById('modal').style.display = 'flex';
    }
    function fecharModal() { document.getElementById('modal').style.display = 'none'; countLimpar = 0; }
</script>
</body>
</html>
